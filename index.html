<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriBin – Smart Compost Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --vetiver:    #C1D591;
    --duck-egg:   #B8D5DA;
    --hydrangea:  #9EC0EB;
    --strawberry: #F1B8D9;
    --basil:      #538376;
    --cream:      #F9F6EF;
    --soft-white: #FEFCF8;
    --text-dark:  #2E4A3E;
    --text-mid:   #5A7A6E;
    --text-light: #8AADA0;
    --shadow:     rgba(83,131,118,0.12);
    --card-bg:    rgba(255,255,255,0.72);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── PAGES ─── */
  .page { display:none; min-height:100vh; }
  .page.active { display:flex; }

  /* ═══════════════════════════════════════
     PAGE 1 – LOGIN
  ═══════════════════════════════════════ */
  #page-login {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #E8F5D9 0%, #D6EBF0 35%, #C9DEFF 65%, #F5D6EA 100%);
    position: relative;
    overflow: hidden;
  }

  /* Floating blobs */
  #page-login::before {
    content:'';
    position:absolute; top:-120px; right:-80px;
    width:420px; height:420px; border-radius:50%;
    background: radial-gradient(circle, rgba(193,213,145,0.45), transparent 70%);
    animation: blob1 7s ease-in-out infinite;
  }
  #page-login::after {
    content:'';
    position:absolute; bottom:-100px; left:-80px;
    width:380px; height:380px; border-radius:50%;
    background: radial-gradient(circle, rgba(241,184,217,0.45), transparent 70%);
    animation: blob2 9s ease-in-out infinite;
  }
  @keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,20px) scale(1.08)} }
  @keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-30px) scale(1.06)} }

  .login-card {
    position: relative; z-index:10;
    background: rgba(255,255,255,0.68);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 52px 48px 44px;
    width: min(480px, 90vw);
    box-shadow: 0 8px 48px rgba(83,131,118,0.18), 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.85);
    text-align: center;
    animation: fadeUp 0.7s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .login-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--basil), var(--vetiver));
    border-radius: 20px;
    display: inline-flex; align-items:center; justify-content:center;
    font-size: 36px; margin-bottom: 20px;
    box-shadow: 0 6px 24px rgba(83,131,118,0.3);
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    color: var(--basil); letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 0.88rem; color: var(--text-light);
    margin-bottom: 36px; letter-spacing: 0.3px;
  }

  .role-btn-group { display:flex; gap:14px; margin-bottom:28px; }

  .role-btn {
    flex:1; padding: 18px 10px;
    border-radius: 18px; border: 2px solid transparent;
    cursor:pointer; transition: all 0.25s ease;
    background: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    color: var(--text-mid);
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .role-btn .role-icon { font-size:2rem; }
  .role-btn.maker { border-color: var(--basil); background: rgba(193,213,145,0.2); }
  .role-btn.user  { border-color: var(--hydrangea); background: rgba(158,192,235,0.2); }
  .role-btn:hover { transform: translateY(-3px); box-shadow:0 6px 20px var(--shadow); }
  .role-btn.selected.maker { background: var(--vetiver); border-color: var(--basil); color: var(--basil); }
  .role-btn.selected.user  { background: var(--hydrangea); border-color: #6A9FD8; color: #1a4a7a; }

  .pw-group { margin-bottom:22px; text-align:left; }
  .pw-label { font-size:0.82rem; color:var(--text-mid); font-weight:500; margin-bottom:7px; display:block; }
  .pw-input {
    width:100%; padding:13px 16px;
    border-radius:13px; border:2px solid rgba(184,213,218,0.6);
    background:rgba(255,255,255,0.7);
    font-family:'DM Sans',sans-serif; font-size:0.95rem;
    color:var(--text-dark); outline:none;
    transition:border-color 0.2s;
  }
  .pw-input:focus { border-color:var(--basil); }

  .login-btn {
    width:100%; padding:15px;
    background: linear-gradient(135deg, var(--basil), #6aab98);
    color:#fff; border:none; border-radius:14px;
    font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600;
    cursor:pointer; transition:all 0.25s;
    box-shadow: 0 4px 18px rgba(83,131,118,0.35);
    letter-spacing:0.3px;
  }
  .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(83,131,118,0.4); }
  .login-btn:active { transform:translateY(0); }

  .err-msg { color:#c0536a; font-size:0.82rem; margin-top:10px; display:none; }

  /* ═══════════════════════════════════════
     PAGE 2 – DASHBOARD
  ═══════════════════════════════════════ */
  #page-dashboard {
    flex-direction: column;
    background: var(--cream);
  }

  /* Sidebar */
  .sidebar {
    width: 230px; min-height:100vh;
    background: linear-gradient(180deg, rgba(193,213,145,0.35) 0%, rgba(184,213,218,0.35) 100%);
    backdrop-filter:blur(10px);
    border-right: 1px solid rgba(255,255,255,0.7);
    padding: 28px 16px;
    display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; z-index:50;
    box-shadow: 2px 0 20px rgba(83,131,118,0.08);
  }
  .sb-logo {
    display:flex; align-items:center; gap:10px; margin-bottom:36px; padding:0 6px;
  }
  .sb-logo-icon {
    width:38px;height:38px;
    background:linear-gradient(135deg,var(--basil),var(--vetiver));
    border-radius:11px; display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 4px 12px rgba(83,131,118,0.3);
  }
  .sb-logo-text { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--basil); }

  .sb-back-btn {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px; border-radius:12px;
    font-size:0.85rem; font-weight:600; color:var(--text-mid);
    cursor:pointer; transition:all 0.2s; margin-bottom:12px;
    background:rgba(255,255,255,0.55);
    border:1.5px solid rgba(184,213,218,0.5);
  }
  .sb-back-btn:hover { background:rgba(241,184,217,0.25); color:#a03060; border-color:rgba(241,184,217,0.6); transform:translateX(-2px); }
    font-size:0.68rem; font-weight:600; color:var(--text-light);
    letter-spacing:1.2px; text-transform:uppercase;
    padding: 0 10px; margin-bottom:6px; margin-top:16px;
  }
  .sb-nav-item {
    display:flex; align-items:center; gap:10px;
    padding:11px 14px; border-radius:12px;
    font-size:0.88rem; font-weight:500; color:var(--text-mid);
    cursor:pointer; transition:all 0.2s; margin-bottom:3px;
    text-decoration:none;
  }
  .sb-nav-item:hover { background:rgba(255,255,255,0.6); color:var(--basil); }
  .sb-nav-item.active { background:rgba(255,255,255,0.8); color:var(--basil); font-weight:600; box-shadow:0 2px 10px var(--shadow); }
  .sb-nav-icon { font-size:1.1rem; width:22px; text-align:center; }

  .sb-role-badge {
    margin-top:auto; padding:12px 14px;
    background:rgba(255,255,255,0.7);border-radius:14px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 10px var(--shadow);
  }
  .sb-role-dot { width:10px;height:10px;border-radius:50%; }
  .sb-role-dot.maker { background:var(--basil); }
  .sb-role-dot.user  { background:var(--hydrangea); box-shadow:0 0 0 3px rgba(241,184,217,0.4); }
  .sb-role-name { font-size:0.82rem; font-weight:600; color:var(--text-dark); }
  .sb-logout {
    margin-top:8px; font-size:0.78rem; color:var(--text-light);
    cursor:pointer; padding:8px 14px; border-radius:10px;
    transition:all 0.2s; text-align:center;
    border:1px solid rgba(200,200,200,0.4);
  }
  .sb-logout:hover { background:rgba(241,184,217,0.3); color:#b03060; }

  /* Main content */
  .main-content { margin-left:230px; padding:32px 32px 80px; flex:1; }

  .page-header { margin-bottom:28px; }
  .page-header h1 { font-family:'Playfair Display',serif; font-size:1.85rem; font-weight:700; color:var(--basil); margin-bottom:4px; }
  .page-header p { font-size:0.88rem; color:var(--text-light); }

  /* Stat cards */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:18px; margin-bottom:24px; }

  .stat-card {
    background:var(--card-bg);
    backdrop-filter:blur(12px);
    border-radius:20px; padding:22px 22px 18px;
    box-shadow:0 4px 20px var(--shadow);
    border:1px solid rgba(255,255,255,0.85);
    transition:transform 0.2s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  .stat-card:hover { transform:translateY(-3px); box-shadow:0 8px 32px var(--shadow); }
  .stat-card::before {
    content:''; position:absolute; top:-20px; right:-20px;
    width:80px;height:80px;border-radius:50%;
    opacity:0.18;
  }
  .stat-card.temp::before   { background:var(--strawberry); }
  .stat-card.humid::before  { background:var(--hydrangea); }
  .stat-card.weight::before { background:var(--vetiver); }
  .stat-card.mixer::before  { background:var(--duck-egg); }

  .stat-icon { font-size:1.6rem; margin-bottom:10px; }
  .stat-label { font-size:0.78rem; font-weight:500; color:var(--text-light); letter-spacing:0.3px; margin-bottom:5px; }
  .stat-value { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--text-dark); }
  .stat-unit  { font-size:0.85rem; color:var(--text-mid); font-family:'DM Sans',sans-serif; }
  .stat-badge {
    display:inline-flex; align-items:center; gap:4px;
    font-size:0.72rem; padding:4px 9px; border-radius:20px;
    font-weight:600; margin-top:8px;
  }
  .badge-on  { background:rgba(193,213,145,0.4); color:#3a6c3a; }
  .badge-off { background:rgba(220,220,220,0.5); color:#888; }

  /* Chart */
  .chart-row { display:grid; grid-template-columns:2fr 1fr; gap:18px; margin-bottom:24px; }
  .card {
    background:var(--card-bg); backdrop-filter:blur(12px);
    border-radius:20px; padding:22px;
    box-shadow:0 4px 20px var(--shadow);
    border:1px solid rgba(255,255,255,0.85);
  }
  .card-title {
    font-family:'Playfair Display',serif; font-size:1rem; font-weight:600;
    color:var(--basil); margin-bottom:16px; display:flex; align-items:center; gap:8px;
  }

  canvas { width:100% !important; }

  /* Donut chart for weight */
  .donut-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; height:180px; }
  .donut-ring { position:relative; width:130px;height:130px; }
  .donut-ring svg { transform:rotate(-90deg); }
  .donut-center {
    position:absolute; top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;
  }
  .donut-center .big-num { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--basil); }
  .donut-center .small-l { font-size:0.72rem; color:var(--text-light); }

  /* Maker controls */
  .controls-row { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:24px; }

  .control-card {
    background:var(--card-bg); backdrop-filter:blur(12px);
    border-radius:20px; padding:22px;
    box-shadow:0 4px 20px var(--shadow);
    border:1px solid rgba(255,255,255,0.85);
  }
  .ctrl-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .ctrl-title  { font-family:'Playfair Display',serif; font-size:1rem; font-weight:600; color:var(--basil); }
  .ctrl-status { font-size:0.75rem; padding:4px 10px; border-radius:20px; font-weight:600; }
  .ctrl-status.on  { background:rgba(193,213,145,0.4);color:#3a6c3a; }
  .ctrl-status.off { background:rgba(220,220,220,0.5);color:#888; }

  .toggle-row { display:flex; gap:10px; margin-bottom:14px; }
  .mode-btn {
    flex:1; padding:11px; border-radius:12px; border:none;
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600;
    cursor:pointer; transition:all 0.2s;
  }
  .mode-btn.auto { background:rgba(193,213,145,0.35); color:#3a6c3a; }
  .mode-btn.manual { background:rgba(241,184,217,0.35); color:#a03060; }
  .mode-btn.active.auto { background:var(--vetiver); }
  .mode-btn.active.manual { background:var(--strawberry); }
  .mode-btn:hover { transform:translateY(-1px); box-shadow:0 3px 10px var(--shadow); }

  .action-btn {
    width:100%; padding:13px; border-radius:13px; border:none;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600;
    cursor:pointer; transition:all 0.25s; margin-top:4px;
  }
  .action-btn.start { background:linear-gradient(135deg,var(--basil),#6aab98); color:#fff; box-shadow:0 4px 14px rgba(83,131,118,0.3); }
  .action-btn.stop  { background:linear-gradient(135deg,#d4709a,#e8a0c0); color:#fff; box-shadow:0 4px 14px rgba(212,112,154,0.3); }
  .action-btn:hover { transform:translateY(-2px); }

  .slider-wrap { margin-top:12px; }
  .slider-label { font-size:0.78rem;color:var(--text-mid);margin-bottom:6px;display:flex;justify-content:space-between; }
  input[type=range] {
    width:100%; accent-color:var(--basil);
    height:4px; border-radius:4px;
    appearance:none; background:linear-gradient(to right, var(--basil) 60%, #ddd 60%);
  }

  /* Info readout for user view */
  .info-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .info-card { background:var(--card-bg);backdrop-filter:blur(12px);border-radius:18px;padding:20px;box-shadow:0 4px 18px var(--shadow);border:1px solid rgba(255,255,255,0.85); }
  .info-label { font-size:0.75rem;color:var(--text-light);font-weight:500;margin-bottom:8px;letter-spacing:0.3px; }
  .info-val { font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--text-dark); }
  .info-meta { font-size:0.75rem;color:var(--text-mid);margin-top:4px; }

  /* ═══════════════════════════════════════
     AI CHAT BUBBLE
  ═══════════════════════════════════════ */
  .ai-fab {
    position:fixed; bottom:32px; right:32px; z-index:1000;
    width:60px; height:60px; border-radius:18px;
    background: conic-gradient(from 0deg, #C1D591, #9EC0EB, #F1B8D9, #B8D5DA, #C1D591);
    box-shadow:0 6px 28px rgba(158,192,235,0.5), 0 2px 8px rgba(0,0,0,0.1);
    cursor:pointer; display:flex;align-items:center;justify-content:center;
    border:none; padding:0;
    transform: rotate(0deg);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    animation: fabPulse 3s ease-in-out infinite;
  }
  .ai-fab.chat-open {
    transform: rotate(-18deg);
    box-shadow: 0 12px 40px rgba(241,184,217,0.6), 0 0 0 5px rgba(193,213,145,0.25);
    animation: none;
  }
  @keyframes fabPulse { 0%,100%{box-shadow:0 6px 28px rgba(158,192,235,0.5)} 50%{box-shadow:0 8px 36px rgba(241,184,217,0.6), 0 0 0 6px rgba(193,213,145,0.18)} }

  .ai-fab-inner {
    width:46px; height:46px; border-radius:13px;
    background: rgba(255,255,255,0.93);
    display:flex; align-items:center; justify-content:center;
  }
  .ai-fab-svg { width:26px; height:26px; }

  .ai-chat-popup {
    position:fixed; bottom:104px; right:32px; z-index:1000;
    width:340px; height:480px;
    background:rgba(254,252,248,0.95);
    backdrop-filter:blur(20px);
    border-radius:24px; box-shadow:0 16px 56px rgba(83,131,118,0.22), 0 4px 16px rgba(0,0,0,0.08);
    border:1px solid rgba(255,255,255,0.9);
    display:flex;flex-direction:column;
    transform: scale(0.7) translateY(40px); transform-origin: bottom right;
    opacity:0; pointer-events:none;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
  }
  .ai-chat-popup.open {
    transform: scale(1) translateY(0);
    opacity:1; pointer-events:all;
  }

  .ai-header {
    padding:16px 18px 14px;
    border-bottom:1px solid rgba(184,213,218,0.4);
    display:flex;align-items:center;gap:10px;
  }
  .ai-avatar {
    width:38px;height:38px;border-radius:12px;
    background:linear-gradient(135deg,var(--hydrangea),var(--strawberry));
    display:flex;align-items:center;justify-content:center;font-size:1.2rem;
    box-shadow:0 3px 10px rgba(158,192,235,0.4);
  }
  .ai-name { font-weight:700;font-size:0.9rem;color:var(--basil); }
  .ai-sub  { font-size:0.72rem;color:var(--text-light); }
  .ai-close { margin-left:auto;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-light);padding:4px;border-radius:8px;transition:background 0.2s; }
  .ai-close:hover { background:rgba(241,184,217,0.3); }

  .ai-msgs {
    flex:1;overflow-y:auto;padding:14px 14px 8px;
    display:flex;flex-direction:column;gap:10px;
  }
  .ai-msgs::-webkit-scrollbar { width:4px; }
  .ai-msgs::-webkit-scrollbar-thumb { background:rgba(184,213,218,0.5);border-radius:4px; }

  .msg { max-width:82%;padding:10px 14px;border-radius:16px;font-size:0.84rem;line-height:1.6; }
  .msg.bot { align-self:flex-start; background:rgba(184,213,218,0.35); color:var(--text-dark); border-bottom-left-radius:4px; }
  .msg.bot span { line-height:1.6; }
  .msg.user-msg { align-self:flex-end; background:linear-gradient(135deg,var(--basil),#6aab98); color:#fff; border-bottom-right-radius:4px; }
  .msg.loading { align-self:flex-start; background:rgba(184,213,218,0.25); color:var(--text-light); font-style:italic; }

  .ai-input-row {
    padding:12px 14px;
    border-top:1px solid rgba(184,213,218,0.35);
    display:flex;gap:8px;align-items:center;
  }
  .ai-input {
    flex:1;padding:10px 14px;border-radius:12px;
    border:1.5px solid rgba(184,213,218,0.5);
    background:rgba(255,255,255,0.7);
    font-family:'DM Sans',sans-serif;font-size:0.84rem;
    color:var(--text-dark);outline:none;
    transition:border-color 0.2s;
  }
  .ai-input:focus { border-color:var(--basil); }
  .ai-send {
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg,var(--basil),#6aab98);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:1rem;
    transition:all 0.2s;box-shadow:0 3px 10px rgba(83,131,118,0.3);
  }
  .ai-send:hover { transform:scale(1.08); }

  /* Quick suggestions */
  .ai-suggestions {
    padding:0 14px 10px;
    display:flex;gap:6px;flex-wrap:wrap;
  }
  .ai-chip {
    font-size:0.72rem;padding:5px 10px;border-radius:20px;
    background:rgba(193,213,145,0.3);color:var(--basil);
    border:1px solid rgba(193,213,145,0.5);
    cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;
    transition:all 0.15s;white-space:nowrap;
  }
  .ai-chip:hover { background:var(--vetiver);transform:translateY(-1px); }

  /* Toast */
  .toast {
    position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:rgba(83,131,118,0.9);color:#fff;
    padding:12px 24px;border-radius:12px;font-size:0.88rem;font-weight:500;
    transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;
    box-shadow:0 6px 24px rgba(83,131,118,0.3);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ─── HAMBURGER MENU ─── */
  .hamburger-btn {
    position: fixed; top: 18px; right: 20px; z-index: 3000;
    width: 44px; height: 44px; border-radius: 13px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
