<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriBin – Smart Compost Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --vetiver:    #C1D591;
    --duck-egg:   #B8D5DA;
    --hydrangea:  #9EC0EB;
    --strawberry: #F1B8D9;
    --basil:      #538376;
    --cream:      #F9F6EF;
    --soft-white: #FEFCF8;
    --text-dark:  #2E4A3E;
    --text-mid:   #5A7A6E;
    --text-light: #8AADA0;
    --shadow:     rgba(83,131,118,0.12);
    --card-bg:    rgba(255,255,255,0.72);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── PAGES ─── */
  .page { display:none; min-height:100vh; }
  .page.active { display:flex; }

  /* ════════════════════════════════════════════════
     PAGE 1 – LOGIN
  ═══════════════════════════════════════════════ */
  #page-login {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #E8F5D9 0%, #D6EBF0 35%, #C9DEFF 65%, #F5D6EA 100%);
    position: relative;
    overflow: hidden;
  }

  /* Floating blobs */
  #page-login::before {
    content:'';
    position:absolute; top:-120px; right:-80px;
    width:420px; height:420px; border-radius:50%;
    background: radial-gradient(circle, rgba(193,213,145,0.45), transparent 70%);
    animation: blob1 7s ease-in-out infinite;
  }
  #page-login::after {
    content:'';
    position:absolute; bottom:-100px; left:-80px;
    width:380px; height:380px; border-radius:50%;
    background: radial-gradient(circle, rgba(241,184,217,0.45), transparent 70%);
    animation: blob2 9s ease-in-out infinite;
  }
  @keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,20px) scale(1.08)} }
  @keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-30px) scale(1.06)} }

  .login-card {
    position: relative; z-index:10;
    background: rgba(255,255,255,0.68);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 52px 48px 44px;
    width: min(480px, 90vw);
    box-shadow: 0 8px 48px rgba(83,131,118,0.18), 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.85);
    text-align: center;
    animation: fadeUp 0.7s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .login-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--basil), var(--vetiver));
    border-radius: 20px;
    display: inline-flex; align-items:center; justify-content:center;
    font-size: 36px; margin-bottom: 20px;
    box-shadow: 0 6px 24px rgba(83,131,118,0.3);
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    color: var(--basil); letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 0.88rem; color: var(--text-light);
    margin-bottom: 36px; letter-spacing: 0.3px;
  }

  .role-btn-group { display:flex; gap:14px; margin-bottom:28px; }

  .role-btn {
    flex:1; padding: 18px 10px;
    border-radius: 18px; border: 2px solid transparent;
    cursor:pointer; transition: all 0.25s ease;
    background: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    color: var(--text-mid);
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .role-btn .role-icon { font-size:2rem; }
  .role-btn.maker { border-color: var(--basil); background: rgba(193,213,145,0.2); }
  .role-btn.user  { border-color: var(--hydrangea); background: rgba(158,192,235,0.2); }
  .role-btn:hover { transform: translateY(-3px); box-shadow:0 6px 20px var(--shadow); }
  .role-btn.selected.maker { background: var(--vetiver); border-color: var(--basil); color: var(--basil); }
  .role-btn.selected.user  { background: var(--hydrangea); border-color: #6A9FD8; color: #1a4a7a; }

  .pw-group { margin-bottom:22px; text-align:left; }
  .pw-label { font-size:0.82rem; color:var(--text-mid); font-weight:500; margin-bottom:7px; display:block; }
  .pw-input {
    width:100%; padding:13px 16px;
    border-radius:13px; border:2px solid rgba(184,213,218,0.6);
    background:rgba(255,255,255,0.7);
    font-family:'DM Sans',sans-serif; font-size:0.95rem;
    color:var(--text-dark); outline:none;
    transition:border-color 0.2s;
  }
  .pw-input:focus { border-color:var(--basil); }

  .login-btn {
    width:100%; padding:15px;
    background: linear-gradient(135deg, var(--basil), #6aab98);
    color:#fff; border:none; border-radius:14px;
    font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600;
    cursor:pointer; transition:all 0.25s;
    box-shadow: 0 4px 18px rgba(83,131,118,0.35);
    letter-spacing:0.3px;
  }
  .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(83,131,118,0.4); }
  .login-btn:active { transform:translateY(0); }

  .err-msg { color:#c0536a; font-size:0.82rem; margin-top:10px; display:none; }

  /* ════════════════════════════════════════════════
     PAGE 2 – DASHBOARD
  ═══════════════════════════════════════════════ */
  #page-dashboard {
    flex-direction: column;
    background: var(--cream);
  }

  /* Sidebar */
  .sidebar {
    width: 230px; min-height:100vh;
    background: linear-gradient(180deg, rgba(193,213,145,0.35) 0%, rgba(184,213,218,0.35) 100%);
    backdrop-filter:blur(10px);
    border-right: 1px solid rgba(255,255,255,0.7);
    padding: 28px 16px;
    display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; z-index:50;
    box-shadow: 2px 0 20px rgba(83,131,118,0.08);
  }
  .sb-logo {
    display:flex; align-items:center; gap:10px; margin-bottom:36px; padding:0 6px;
  }
  .sb-logo-icon {
    width:38px;height:38px;
    background:linear-gradient(135deg,var(--basil),var(--vetiver));
    border-radius:11px; display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 4px 12px rgba(83,131,118,0.3);
  }
  .sb-logo-text { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--basil); }

  .sb-back-btn {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px; border-radius:12px;
    font-size:0.85rem; font-weight:600; color:var(--text-mid);
    cursor:pointer; transition:all 0.2s; margin-bottom:12px;
    background:rgba(255,255,255,0.55);
    border:1.5px solid rgba(184,213,218,0.5);
  }
  .sb-back-btn:hover { background:rgba(241,184,217,0.25); color:#a03060; border-color:rgba(241,184,217,0.6); transform:translateX(-2px); }
    font-size:0.68rem; font-weight:600; color:var(--text-light);
    letter-spacing:1.2px; text-transform:uppercase;
    padding: 0 10px; margin-bottom:6px; margin-top:16px;
  }
  .sb-nav-item {
    display:flex; align-items:center; gap:10px;
    padding:11px 14px; border-radius:12px;
    font-size:0.88rem; font-weight:500; color:var(--text-mid);
    cursor:pointer; transition:all 0.2s; margin-bottom:3px;
    text-decoration:none;
  }
  .sb-nav-item:hover { background:rgba(255,255,255,0.6); color:var(--basil); }
  .sb-nav-item.active { background:rgba(255,255,255,0.8); color:var(--basil); font-weight:600; box-shadow:0 2px 10px var(--shadow); }
  .sb-nav-icon { font-size:1.1rem; width:22px; text-align:center; }

  .sb-role-badge {
    margin-top:auto; padding:12px 14px;
    background:rgba(255,255,255,0.7);border-radius:14px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 10px var(--shadow);
  }
  .sb-role-dot { width:10px;height:10px;border-radius:50%; }
  .sb-role-dot.maker { background:var(--basil); }
  .sb-role-dot.user  { background:var(--hydrangea); box-shadow:0 0 0 3px rgba(241,184,217,0.4); }
  .sb-role-name { font-size:0.82rem; font-weight:600; color:var(--text-dark); }
  .sb-logout {
    margin-top:8px; font-size:0.78rem; color:var(--text-light);
    cursor:pointer; padding:8px 14px; border-radius:10px;
    transition:all 0.2s; text-align:center;
    border:1px solid rgba(200,200,200,0.4);
  }
  .sb-logout:hover { background:rgba(241,184,217,0.3); color:#b03060; }

  /* Main content */
  .main-content { margin-left:230px; padding:32px 32px 80px; flex:1; }

  .page-header { margin-bottom:28px; }
  .page-header h1 { font-family:'Playfair Display',serif; font-size:1.85rem; font-weight:700; color:var(--basil); margin-bottom:4px; }
  .page-header p { font-size:0.88rem; color:var(--text-light); }

  /* Stat cards */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:18px; margin-bottom:24px; }

  .stat-card {
    background:var(--card-bg);
    backdrop-filter:blur(12px);
    border-radius:20px; padding:22px 22px 18px;
    box-shadow:0 4px 20px var(--shadow);
    border:1px solid rgba(255,255,255,0.85);
    transition:transform 0.2s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  .stat-card:hover { transform:translateY(-3px); box-shadow:0 8px 32px var(--shadow); }
  .stat-card::before {
    content:''; position:absolute; top:-20px; right:-20px;
    width:80px;height:80px;border-radius:50%;
    opacity:0.18;
  }
  .stat-card.temp::before   { background:var(--strawberry); }
  .stat-card.humid::before  { background:var(--hydrangea); }
  .stat-card.weight::before { background:var(--vetiver); }
  .stat-card.mixer::before  { background:var(--duck-egg); }

  .stat-icon { font-size:1.6rem; margin-bottom:10px; }
  .stat-label { font-size:0.78rem; font-weight:500; color:var(--text-light); letter-spacing:0.3px; margin-bottom:5px; }
  .stat-value { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--text-dark); }
  .stat-unit  { font-size:0.85rem; color:var(--text-mid); font-family:'DM Sans',sans-serif; }
  .stat-badge {
    display:inline-flex; align-items:center; gap:4px;
    font-size:0.72rem; padding:4px 9px; border-radius:20px;
    font-weight:600; margin-top:8px;
  }
  .badge-on  { background:rgba(193,213,145,0.4); color:#3a6c3a; }
  .badge-off { background:rgba(220,220,220,0.5); color:#888; }
  .badge-error { background:rgba(192,83,106,0.2); color:#c0536a; }

  /* Chart */
  .chart-row { display:grid; grid-template-columns:2fr 1fr; gap:18px; margin-bottom:24px; }
  .card {
    background:var(--card-bg); backdrop-filter:blur(12px);
    border-radius:20px; padding:22px;
    box-shadow:0 4px 20px var(--shadow);
    border:1px solid rgba(255,255,255,0.85);
  }
  .card-title {
    font-family:'Playfair Display',serif; font-size:1rem; font-weight:600;
    color:var(--basil); margin-bottom:16px; display:flex; align-items:center; gap:8px;
  }

  canvas { width:100% !important;
